services:
  - type: web
    name: talentsphere-backend
    runtime: node
    plan: free
    buildCommand: npm install
    startCommand: node src/server.js
    postDeployCommand: node src/config/migrate.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: "10000"
      - key: DATABASE_URL
        fromDatabase:
          name: jobportal
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_EXPIRES_IN
        value: 7d
      - key: AI_SERVICE_URL
        value: https://talentsphere-ai.onrender.com
      - key: FRONTEND_URL
        value: https://talentsphere-frontend.vercel.app
      - key: SMTP_HOST
        value: smtp.gmail.com
      - key: SMTP_PORT
        value: "587"
      - key: SMTP_USER
        sync: false
      - key: SMTP_PASS
        sync: false
      - key: GOOGLE_CLIENT_ID
        sync: false
      - key: GOOGLE_CLIENT_SECRET
        sync: false
      - key: GITHUB_CLIENT_ID
        sync: false
      - key: GITHUB_CLIENT_SECRET
        sync: false
      - key: MAX_FILE_SIZE
        value: "5242880"
      - key: ALLOWED_FILE_TYPES
        value: image/jpeg,image/png,application/pdf
    healthCheckPath: /api/health
